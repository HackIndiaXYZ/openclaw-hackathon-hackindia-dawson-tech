<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>

<title>Python & Math Quiz - 100 Questions</title>
<style>
:root {
  --bg-color: #f4f4f9;
  --text-color: #333;
  --primary-color: #2575fc;
  --secondary-color: #6a11cb;
}
body.dark {
  --bg-color: #1c1c1c;
  --text-color: #fff;
  --primary-color: #ff416c;
  --secondary-color: #ff4b2b;
}
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: var(--bg-color);
  color: var(--text-color);
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  transition: 0.3s;
}
.container {
  background-color: #fff;
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 720px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  transition: 0.3s;
}
body.dark .container { background-color: #2c2c2c; }
h1 { margin: 10px 0 20px; color: var(--primary-color); }
#progress {
  height: 8px;
  background: var(--primary-color);
  border-radius: 4px;
  margin-bottom: 15px;
  transition: width 0.3s;
}
#score-live {
  font-size: 1.1em;
  font-weight: bold;
  margin-bottom: 10px;
  color: var(--secondary-color);
}
#question { font-size: 1.25em; margin: 20px 0; line-height: 1.4; }
#answers button {
  display: block;
  margin: 12px auto;
  padding: 14px 20px;
  width: 85%;
  cursor: pointer;
  border-radius: 10px;
  border: none;
  background-color: var(--secondary-color);
  color: white;
  font-size: 1.05em;
  transition: all 0.3s;
}
#answers button:hover { transform: translateY(-2px); opacity: 0.9; }
#answers button.correct { background-color: #4caf50; }
#answers button.wrong { background-color: #f44336; }
#timer { font-size: 1.2em; font-weight: bold; margin: 10px 0; }
#timer.low { color: #f44336; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% {opacity:1} 50% {opacity:0.6} }

button#next-btn, button#restart-btn, button#start-btn, button#mode-btn, button#review-btn, button#back-to-result {
  padding: 12px 28px;
  margin: 10px 5px;
  cursor: pointer;
  border-radius: 10px;
  border: none;
  background-color: var(--primary-color);
  color: white;
  font-weight: bold;
  font-size: 1.05em;
}
.hide { display: none; }
#result { text-align: center; }
#result p { font-size: 1.4em; margin: 20px 0; }
.confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
</style>
</head>
<body>
<div class="container">
  <h1>🚀 Python & Math Quiz</h1>
  <button id="mode-btn">🌙 Toggle Dark Mode</button>

  <div id="homepage">
    <br>
    <label for="question-limit">Number of Questions: </label>
    <select id="question-limit">
      <option value="10">10</option>
      <option value="20">20</option>
      <option value="50">50</option>
      <option value="100" selected>100</option>
    </select>
    <button id="start-btn">Start Quiz</button>
  </div>

  <div id="quiz-container" class="hide">
    <div id="progress"></div>
    <div id="score-live">Score: 0 / 0</div>
    <div id="timer">Time Left: 15s</div>
    <div id="question"></div>
    <div id="answers"></div>
    <button id="next-btn">Next Question →</button>
  </div>
  
  <div id="result" class="hide">
    <p id="score-text"></p>
    <button id="review-btn">Review My Answers</button>
    <button id="restart-btn">Start New Quiz</button>
  </div>

  <div id="review-section" class="hide">
    <h2>Review Your Answers</h2>
    <div id="review-content"></div>
    <button id="back-to-result">Back to Results</button>

</div>

<canvas id="confetti" class="confetti hide"></canvas>

let currentQuestion = 0;
let score = 0;
let questionLimit = 100;
let timer;
let timePerQuestion = 15;
let userAnswers = [];

const homepage = document.getElementById("homepage");
const questionLimitSelect = document.getElementById("question-limit");
const startBtn = document.getElementById("start-btn");
const quizContainer = document.getElementById("quiz-container");
const progressBar = document.getElementById("progress");
const scoreLive = document.getElementById("score-live");
const timerEl = document.getElementById("timer");
const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const nextBtn = document.getElementById("next-btn");

const resultScreen = document.getElementById("result");
const scoreText = document.getElementById("score-text");
const reviewBtn = document.getElementById("review-btn");
const restartBtn = document.getElementById("restart-btn");

const reviewSection = document.getElementById("review-section");
const reviewContent = document.getElementById("review-content");
const backToResult = document.getElementById("back-to-result");

const confettiCanvas = document.getElementById("confetti");
const ctx = confettiCanvas.getContext("2d");

document.getElementById("mode-btn").addEventListener("click", () => document.body.classList.toggle("dark"));

startBtn.addEventListener("click", () => {
  questionLimit = parseInt(questionLimitSelect.value);
  userAnswers = [];
  currentQuestion = 0;
  score = 0;
  homepage.classList.add("hide");
  quizContainer.classList.remove("hide");
  loadQuestion();
});

function loadQuestion() {
  clearInterval(timer);
  if (currentQuestion >= questionLimit) {
    showResult();
    return;
  }
  const q = quizData[currentQuestion];
  questionEl.textContent = `Q${currentQuestion + 1}: ${q.question}`;
  const progressPercent = ((currentQuestion) / questionLimit) * 100;
  progressBar.style.width = `${progressPercent}%`;
  scoreLive.textContent = `Score: ${score} / ${currentQuestion}`;
  answersEl.innerHTML = '';
  const shuffled = [...q.answers].sort(() => Math.random() - 0.5);
  shuffled.forEach((ans, index) => {
    const btn = document.createElement("button");
    btn.textContent = `${index+1}. ${ans}`;
    btn.addEventListener("click", () => selectAnswer(ans, btn));
    answersEl.appendChild(btn);
  });
  startTimer();
}

function selectAnswer(selected, btn) {
  const correct = quizData[currentQuestion].correct;
  userAnswers[currentQuestion] = selected;
  if (selected === correct) {
    score++;
    btn.classList.add("correct");
  } else {
    btn.classList.add("wrong");
    Array.from(answersEl.children).forEach(b => {
      if (b.textContent.includes(correct)) b.classList.add("correct");
    });
  }
  Array.from(answersEl.children).forEach(b => b.disabled = true);
  clearInterval(timer);
  scoreLive.textContent = `Score: ${score} / ${currentQuestion + 1}`;
}

function startTimer() {
  let time = timePerQuestion;
  timerEl.textContent = `Time Left: ${time}s`;
  timerEl.classList.remove("low");
  timer = setInterval(() => {
    time--;
    timerEl.textContent = `Time Left: ${time}s`;
    if (time <= 5) timerEl.classList.add("low");
    if (time <= 0) {
      clearInterval(timer);
      const correct = quizData[currentQuestion].correct;
      Array.from(answersEl.children).forEach(b => {
        if (b.textContent.includes(correct)) b.classList.add("correct");
        b.disabled = true;
      });
    }
  }, 1000);
}

nextBtn.addEventListener("click", () => {
  currentQuestion++;
  loadQuestion();
});

function showResult() {
  clearInterval(timer);
  quizContainer.classList.add("hide");
  resultScreen.classList.remove("hide");
  const total = questionLimit;
  const percentage = Math.round((score / total) * 100);
  let message = "";
  if (percentage >= 90) message = "🏆 Outstanding! You're a genius!";
  else if (percentage >= 80) { message = "🎉 Excellent work!"; triggerConfetti(); }
  else if (percentage >= 70) message = "👍 Great job!";
  else if (percentage >= 50) message = "🙂 Not bad! Keep practicing.";
  else message = "💪 Keep learning! You'll improve next time.";
  scoreText.innerHTML = `Quiz Completed!<br>Your Score: <strong>${score} / \( {total}</strong> ( \){percentage}%)<br><br>${message}`;
}
